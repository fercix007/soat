<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario SOAT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="card shadow-sm rounded-4">
    <div class="card-header bg-primary text-white fs-5">
      <i class="bi bi-file-earmark-text"></i> Solicitud de Indemnización por Incapacidad Temporal
    </div>
    <div class="card-body">

      <!-- DATOS GENERALES -->
      <h5 class="text-primary mb-3"><i class="bi bi-info-circle"></i> Datos Generales</h5>
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label">Fecha de Solicitud</label>
          <input type="date" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Fecha de Accidente</label>
          <input type="date" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Placa</label>
          <input type="text" class="form-control" value="T6W-355" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">N° Certificado</label>
          <input type="text" class="form-control" value="7005241356" required>
        </div>
      </div>

      <!-- DATOS DEL SOLICITANTE -->
      <h5 class="text-primary mb-3"><i class="bi bi-person-vcard"></i> Datos del Solicitante</h5>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Nombres y Apellidos</label>
          <input type="text" class="form-control" value="JORGE YOMER REYNA MOZO">
        </div>
        <div class="col-md-3">
          <label class="form-label">DNI</label>
          <input type="text" class="form-control" value="71620488">
        </div>
        <div class="col-md-3">
          <label class="form-label">Celular</label>
          <input type="text" class="form-control" value="901107389">
        </div>
        <div class="col-md-6">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" value="reynamozojorge3@gmail.com">
        </div>
        <div class="col-md-6">
          <label class="form-label">Domicilio</label>
          <input type="text" class="form-control" value="BARRIO 3A C. POBLADO MENOR ALTO TRUJILLO MZ B LT 27">
        </div>
        <div class="col-md-6">
          <label class="form-label">Relación con el lesionado</label>
          <select class="form-select">
            <option selected>Lesionado</option>
            <option>Cónyuge o conviviente</option>
            <option>Hijo</option>
            <option>Padres</option>
            <option>Otros</option>
          </select>
        </div>
      </div>

      <!-- DATOS DEL LESIONADO -->
      <h5 class="text-primary mb-3"><i class="bi bi-person-fill-injured"></i> Datos del Lesionado</h5>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Nombres y Apellidos</label>
          <input type="text" class="form-control" value="JORGE YOMER REYNA MOZO">
        </div>
        <div class="col-md-3">
          <label class="form-label">DNI</label>
          <input type="text" class="form-control" value="71620488">
        </div>
        <div class="col-md-3">
          <label class="form-label">Celular</label>
          <input type="text" class="form-control" value="901107389">
        </div>
        <div class="col-md-6">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" value="reynamozojorge3@gmail.com">
        </div>
        <div class="col-md-6">
          <label class="form-label">Domicilio</label>
          <input type="text" class="form-control" value="BARRIO 3A C. POBLADO MENOR ALTO TRUJILLO MZ B LT 27">
        </div>
      </div>

      <!-- DATOS DE CUENTA BANCARIA -->
      <h5 class="text-primary mb-3"><i class="bi bi-bank"></i> Datos de la Cuenta Bancaria (Beneficiario)</h5>
      <div class="row g-3 mb-3">
        <div class="col-md-12">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" checked>
            <label class="form-check-label">Transferencia Bancaria</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Giro bancario en BCP</label>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nombre titular de la cuenta</label>
          <input type="text" class="form-control" value="JORGE YOMER REYNA MOZO">
        </div>
        <div class="col-md-3">
          <label class="form-label">DNI</label>
          <input type="text" class="form-control" value="71620488">
        </div>
        <div class="col-md-12">
          <label class="form-label">Banco</label>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Continental</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox"><label class="form-check-label">BCP</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox"><label class="form-check-label">Scotiabank</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox"><label class="form-check-label">Interbank</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox"><label class="form-check-label">Banco de la Nación</label></div>
        </div>
        <div class="col-md-3">
          <label class="form-label">Tipo de cuenta</label>
          <select class="form-select">
            <option selected>Cta. Ahorros</option>
            <option>Cta. Corriente</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Tipo de moneda</label>
          <select class="form-select">
            <option selected>Soles</option>
            <option>Dólares</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">N° de cuenta</label>
          <input type="text" class="form-control" value="57099110840013">
        </div>
        <div class="col-md-3">
          <label class="form-label">Código Interbancario (CCI)</label>
          <input type="text" class="form-control" value="00257019911084001305">
        </div>
      </div>

      <!-- DOCUMENTOS -->
      <h5 class="text-primary mb-3"><i class="bi bi-folder-check"></i> Documentos Presentados</h5>
      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" checked>
        <label class="form-check-label">Copia del Documento de Identidad del lesionado</label>
      </div>
      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" checked>
        <label class="form-check-label">Copia del Documento de Identidad del solicitante</label>
      </div>
      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" checked>
        <label class="form-check-label">Copia certificada de la denuncia policial</label>
      </div>
      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" checked>
        <label class="form-check-label">Certificado médico del lesionado</label>
      </div>

      <!-- BOTÓN -->
      <div class="text-end">
        <button class="btn btn-success">
          <i class="bi bi-send-check"></i> Enviar Solicitud
        </button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

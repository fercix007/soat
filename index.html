<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión Siniestros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="estilos/inicio.css" rel="stylesheet">
</head>
<body>

    <div class="sidebar d-flex flex-column">
        <div class="text-center p-3">
            <i class="bi bi-person-circle" style="font-size: 2rem;"></i>
            <h4 class="mt-2">Ejecutivo</h4>
        </div>
        <hr class="border-light">
        <ul class="nav flex-column">
            <li><a href="#" class="nav-link" data-target="inicio.html"><i class="bi bi-house me-2"></i><span>Inicio</span></a></li>
            <li>
                <a href="#" class="nav-link" data-target="listar_siniestros.html"><i class="fas fa-car-crash me-2"></i><span>Siniestros</span></a>
                <a href="#" class="nav-link" data-target="accidentados.html"><i class="bi bi-person-lines-fill me-2"></i><span>Accidentados</span></a>
                <a href="#" class="nav-link" data-target="consulta-cg.html"><i class="bi bi-search me-2"></i><span>Consulta CG</span></a>
                <a href="#" class="nav-link" data-target="reembolsos.html"><i class="bi bi-person-vcard me-2"></i><span>Auditor Medico</span></a>
                <a href="#" class="nav-link" data-target="liquidaciones.html"><i class="bi bi-wallet me-2"></i><span>Liquidador</span></a>
                <a href="#" class="nav-link" data-target="tramas.html"><i class="bi bi-file-earmark-excel me-2"></i><span>Tramas</span></a>    


            </li>
        </ul>
    </div>

    <div class="content">
        <div class="topbar d-flex align-items-center p-2">
            <button id="sidebar-toggle" class="btn btn-sm"><i class="bi bi-list"></i></button>
            <div class="ms-auto">
                <i class="bi bi-book me-3"></i>
                <i class="bi bi-lightbulb me-3"></i>
                <div class="me-3 position-relative d-inline-block">
                    <i class="bi bi-bell"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">2</span>
                </div>
                <i class="bi bi-person-circle"></i>
            </div>
        </div>

        <div id="main-content" class="p-3">
            <h4 class="text-muted">Gestión de Siniestros</h4>
            <p>Este es el contenido inicial de la página de inicio.</p>
        </div>
    </div>

    <!-- jQuery (necesario si los archivos cargados lo usan) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    

    <script>
     document.addEventListener('DOMContentLoaded', function() {
        const sidebar = document.querySelector('.sidebar');
        const content = document.querySelector('.content');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const navLinks = document.querySelectorAll('.nav-link[data-target]');
        const mainContent = document.getElementById('main-content');
        let currentDynamicScript = null;
        const dynamicPageScripts = new Set([
            'add_siniestro.js',
            'add_siniestroOk.js',
            'consulta-cg.js',
            'inicio.js',
            'liquidaciones.js',
            'reembolsos.js',
            'tramas.js'
        ]);

        function setActiveLink(target) {
            navLinks.forEach(link => link.classList.remove('active'));
            const activeLink = document.querySelector(`.nav-link[data-target="${target}"]`);
            if (activeLink) activeLink.classList.add('active');
        }

        function loadPageScript(target) {
            const scriptName = target.replace('.html', '.js');
            const jsFile = 'js/' + scriptName;

            if (currentDynamicScript) {
                currentDynamicScript.remove();
                currentDynamicScript = null;
            }

            if (!dynamicPageScripts.has(scriptName)) {
                return Promise.resolve();
            }

            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = jsFile + '?v=' + Date.now();
                script.dataset.dynamicPageScript = 'true';
                script.onload = () => {
                    currentDynamicScript = script;
                    resolve();
                };
                script.onerror = () => resolve();
                document.body.appendChild(script);
            });
        }

        function loadContent(target) {
            setActiveLink(target);
            const cacheBustedTarget = `${target}${target.includes('?') ? '&' : '?'}v=${Date.now()}`;

            return fetch(cacheBustedTarget)
                .then(res => {
                    if (!res.ok) {
                        throw new Error('No se pudo cargar la vista: ' + target);
                    }
                    return res.text();
                })
                .then(html => {
                    mainContent.innerHTML = html;
                    sessionStorage.setItem('currentPage', target);
                    return loadPageScript(target);
                })
                .then(() => {
                    document.dispatchEvent(new CustomEvent('page:loaded', {
                        detail: { target: target }
                    }));
                })
                .catch(error => {
                    mainContent.innerHTML = '<div class="alert alert-danger">' + error.message + '</div>';
                });
        }

        window.loadSiniestroPage = loadContent;

        sidebarToggle.addEventListener('click', function () {
            sidebar.classList.toggle('collapsed');
            content.classList.toggle('collapsed');
        });

        navLinks.forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                loadContent(this.getAttribute('data-target'));
            });
        });

        document.addEventListener('click', function (e) {
            const target = e.target.closest('[data-target], [data-nav-target]');
            if (!target) {
                return;
            }

            if (target.classList.contains('nav-link')) {
                return;
            }

            const url = target.getAttribute('data-nav-target') || target.getAttribute('data-target');
            if (!url || !url.endsWith('.html')) {
                return;
            }

            e.preventDefault();
            loadContent(url);
        });

        const savedPage = sessionStorage.getItem('currentPage');
        const initialPage = savedPage ? savedPage : 'inicio.html';
        loadContent(initialPage);
    });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Solicitud Modal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .icon-btn {
      cursor: pointer;
      margin: 0 5px;
    }
    .modal-xxl {
  max-width: 90% !important; /* Puedes ajustarlo al 100% si deseas pantalla completa */
}
  </style>
</head>
<body>

<!-- Botón para abrir el modal principal -->
<div class="p-3">
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#solicitudModal">Nueva Solicitud</button>
</div>

<!-- Modal principal -->
<div class="modal fade" id="solicitudModal" tabindex="-1">
  <div class="modal-dialog modal-xxl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">NUEVA SOLICITUD</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <!-- Formulario DATOS -->
          <div class="col-md-4">
            <fieldset class="border p-3 rounded">
              <legend class="float-none w-auto fs-6">DATOS</legend>
              <form id="solicitudForm">
                <input type="hidden" id="editIndex">
                <div class="row g-2">
                  <div class="col-md-6">
                    <label class="form-label" for="tipo_solicitud">TIPO SOLICITUD (*)</label>
                    <select class="form-select" id="tipo_solicitud" onchange="actualizarCoberturaPorTipo()">
                      <option value="">Seleccione</option>
                      <option value="INDEMNIZACION">INDEMNIZACION</option>
                      <option value="REEMBOLSO">REEMBOLSO</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="cobertura">COBERTURA (*)</label>
                    <select class="form-select" id="cobertura" disabled>
                      <option value="">Seleccione</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="monto">MONTO SOLICITADO/CARTA (*)</label>
                    <input type="number" class="form-control" id="monto">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="fecha">FECHA DE RECEPCIÓN</label>
                    <input type="date" class="form-control" id="fecha">
                  </div>
                  <div class="col-12">
                    <label class="form-check-label">
                      <input class="form-check-input me-1" type="checkbox" id="beneficiario_mismo"> EL BENEFICIARIO ES EL MISMO QUE EL ACCIDENTADO
                    </label>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="tipo_documento">TIPO DOCUMENTO (*)</label>
                    <select class="form-select" id="tipo_documento">
                      <option>DNI</option>
                      <option>CE</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="numero_documento">NUMERO (*)</label>
                    <input type="text" class="form-control" id="numero_documento">
                  </div>
                  <div class="col-md-12">
                    <label class="form-label" for="beneficiario">BENEFICIARIO (*)</label>
                    <input type="text" class="form-control" id="beneficiario">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="celular">CELULAR (*)</label>
                    <input type="text" class="form-control" id="celular">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="correo">CORREO (*)</label>
                    <input type="email" class="form-control" id="correo">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="banco">BANCO</label>
                    <select class="form-select" id="banco">
                      <option value="">Seleccione</option>
                      <option value="BCP">BCP</option>
                      <option value="BBVA">BBVA</option>
                      <option value="INTERBANK">INTERBANK</option>
                      <option value="SCOTIABANK"> SCOTIABANK</option>
                    </select>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="cuenta">NRO CUENTA</label>
                    <input type="text" class="form-control" id="cuenta">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="cci">CCI</label>
                    <input type="text" class="form-control" id="cci">
                  </div>
                  <div class="col-12 mt-3 d-flex gap-2">
                    <button type="button" id="btnGuardar" class="btn btn-primary w-100" onclick="agregarSolicitud()">AGREGAR</button>
                    <button type="button" id="btnCancelar" class="btn btn-secondary w-100 d-none" onclick="cancelarEdicion()">CANCELAR</button>
                  </div>
                </div>
              </form>
            </fieldset>
          </div>

          <!-- Tabla SOLICITUDES -->
          <div class="col-md-8">
            <fieldset class="border p-3 rounded">
              <legend class="float-none w-auto fs-6">SOLICITUDES</legend>
              <div class="table-responsive">
                <table class="table table-bordered table-sm align-middle text-center" id="tablaSolicitudes">
                  <thead class="table-light">
                    <tr>
                      <th>#</th>
                      <th>TIPO SOLICITUD</th>
                      <th>COBERTURA</th>
                      <th>MONTO</th>
                      <th>FECHA RECEPCIÓN</th>
                      <th>BENEFICIARIO</th>
                      <th>ESTADO</th>
                      <th>ACCIONES</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </fieldset>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="btnGuardarSolicitud" class="btn btn-success" disabled>GUARDAR</button>
        <button class="btn btn-danger" data-bs-dismiss="modal">CERRAR</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal de anulación -->
<div class="modal fade" id="modalAnular" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Motivo de Anulación</h5></div>
      <div class="modal-body">
        <textarea class="form-control" id="motivoAnulacion" rows="3" placeholder="Ingrese el motivo..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarEliminacion()">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Observación -->
<div class="modal fade" id="modalObservacion" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Observación</h5></div>
      <div class="modal-body">
        <textarea class="form-control" id="motivoObservacion" rows="3" placeholder="Ingrese el motivo..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarObservacion()">Observar</button>
      </div>
    </div>
  </div>
</div>

<script>

function actualizarCoberturaPorTipo() {
  const tipo = document.getElementById('tipo_solicitud').value;
  const cobertura = document.getElementById('cobertura');

  const opciones = {
    INDEMNIZACION: [
      "INCAPACIDAD TEMPORAL",
      "INVALIDEZ PERMANENTE",
      "MUERTE"
    ],
    REEMBOLSO: [
      "SEPELIO",
      "GASTOS MEDICOS"
    ]
  };

  // Limpiar selección previa y deshabilitar por defecto
  cobertura.innerHTML = '<option value="">Seleccione</option>';
  cobertura.value = ""; // <- Limpia selección previa
  cobertura.disabled = true;

  if (opciones[tipo]) {
    cobertura.disabled = false;
    opciones[tipo].forEach(op => {
      const option = document.createElement('option');
      option.value = op;
      option.textContent = op;
      cobertura.appendChild(option);
    });
  }
}

function editarSolicitud(index) {
  const item = solicitudes[index];
  document.getElementById('tipo_solicitud').value = item.tipo;
  actualizarCoberturaPorTipo(); // <- ¡Muy importante!

  document.getElementById('cobertura').value = item.cobertura;
  // resto del código...
}


  /*****************CRUD TABLA**********************/
  let solicitudes = [];
  let indexParaEliminar = null;
  let indexParaObservacion = null;

  function agregarSolicitud() {
    const tipo = document.getElementById('tipo_solicitud').value;
    const cobertura = document.getElementById('cobertura').value;
    const monto = document.getElementById('monto').value;
    const fecha = document.getElementById('fecha').value;
    const beneficiario = document.getElementById('beneficiario').value;
    const beneficiarioMismo = document.getElementById('beneficiario_mismo').checked;
    const estado = '<select class="form-select" id="estado" onchange="prepararObservacion(this.value)"><option value="PENDIENTE">PENDIENTE</option><option value="OBSERVADO">OBSERVADO</option><option value="RECHAZADO">RECHAZADO</option></select>';
    const tipoDocumento = document.getElementById('tipo_documento').value;
    const numeroDocumento = document.getElementById('numero_documento').value;
    const celular = document.getElementById('celular').value;
    const correo = document.getElementById('correo').value;
    const banco = document.getElementById('banco').value;
    const cuenta = document.getElementById('cuenta').value;
    const cci = document.getElementById('cci').value;

    const editIndex = document.getElementById('editIndex').value;

    if (!tipo) {
    alert("Debe seleccionar un TIPO DE SOLICITUD.");
    return;
    }

    if (!cobertura) {
      alert("Debe seleccionar una COBERTURA válida.");
      return;
    }

    const nuevaSolicitud = {
      tipo,
      cobertura,
      monto,
      fecha,
      beneficiarioMismo,
      beneficiario,
      tipoDocumento,
      estado,
      numeroDocumento,
      celular,
      correo,
      banco,
      cuenta,
      cci
    };

    if (editIndex === "") {
      solicitudes.push(nuevaSolicitud);
    } else {
      solicitudes[editIndex] = nuevaSolicitud;
      document.getElementById('editIndex').value = "";
      document.getElementById('btnGuardar').textContent = "AGREGAR";
      document.getElementById('btnCancelar').classList.add("d-none");
      document.getElementById('btnGuardar').classList.remove("btn-warning");
      document.getElementById('btnGuardar').classList.add("btn-primary");
    }

    document.getElementById('solicitudForm').reset();
    renderTabla();
    document.getElementById('cobertura').innerHTML = '<option value="">Seleccione</option>';
    document.getElementById('cobertura').disabled = true;
  }

  function renderTabla() {
    const tbody = document.querySelector('#tablaSolicitudes tbody');
    tbody.innerHTML = "";

    solicitudes.forEach((item, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${item.tipo}</td>
        <td>${item.cobertura}</td>
        <td>${item.monto}</td>
        <td>${item.fecha}</td>
        <td>${item.beneficiario}</td>
        <td>${item.estado}</td>
        <td>
          <i class="bi bi-pencil text-primary icon-btn" onclick="editarSolicitud(${index})" title="Editar"></i>
          <i class="bi bi-trash text-danger icon-btn" onclick="prepararEliminacion(${index})" title="Eliminar"></i>
        </td>
      `;
      tbody.appendChild(row);
    });

    if(solicitudes.length > 0){
      document.getElementById('btnGuardarSolicitud').disabled = false;
    }else{
      document.getElementById('btnGuardarSolicitud').disabled = true;
    }
  }

  function editarSolicitud(index) {
    const item = solicitudes[index];
      // Set tipo y reconstruye opciones de cobertura
  document.getElementById('tipo_solicitud').value = item.tipo;
  actualizarCoberturaPorTipo(); // <- esto reconstruye las opciones

    // Espera a que cobertura esté lista, luego asigna el valor
    setTimeout(() => {
      document.getElementById('cobertura').value = item.cobertura;
      document.getElementById('cobertura').disabled = false;
    }, 0); // asegura que cobertura esté llena antes de asignar valor

    document.getElementById('monto').value = item.monto;
    document.getElementById('fecha').value = item.fecha;
    document.getElementById('beneficiario_mismo').checked = item.beneficiarioMismo;
    document.getElementById('beneficiario').value = item.beneficiario;
    document.getElementById('tipo_documento').value = item.tipoDocumento;
    document.getElementById('numero_documento').value = item.numeroDocumento;
    document.getElementById('celular').value = item.celular;
    document.getElementById('correo').value = item.correo;
    document.getElementById('banco').value = item.banco;
    document.getElementById('cuenta').value = item.cuenta;
    document.getElementById('cci').value = item.cci;

    document.getElementById('editIndex').value = index;

    const btn = document.getElementById('btnGuardar');
    btn.textContent = "EDITAR";
    btn.classList.remove("btn-primary");
    btn.classList.add("btn-warning");

    document.getElementById('btnCancelar').classList.remove("d-none");
    
  }

  function prepararEliminacion(index) {
    indexParaEliminar = index;
    document.getElementById('motivoAnulacion').value = "";
    new bootstrap.Modal(document.getElementById('modalAnular')).show();
  }

  function confirmarEliminacion() {
    const motivo = document.getElementById('motivoAnulacion').value.trim();
    if (motivo === "") {
      alert("Debe ingresar un motivo para anular.");
      return;
    }
    solicitudes.splice(indexParaEliminar, 1);
    renderTabla();
    bootstrap.Modal.getInstance(document.getElementById('modalAnular')).hide();
  }


  function prepararObservacion(index) {
    document.getElementById('motivoObservacion').value = "";
    new bootstrap.Modal(document.getElementById('modalObservacion')).show();
  }
  function confirmarObservacion() {
    const observacion = document.getElementById('motivoObservacion').value.trim();
    if (observacion === "") {
      alert("Debe ingresar un motivo para observar.");
      return;
    }
    bootstrap.Modal.getInstance(document.getElementById('modalObservacion')).hide();
  }

  function cancelarEdicion() {
  document.getElementById('solicitudForm').reset();
  document.getElementById('editIndex').value = "";

  const btn = document.getElementById('btnGuardar');
  btn.textContent = "AGREGAR";
  btn.classList.remove("btn-warning");
  btn.classList.add("btn-primary");

  document.getElementById('btnCancelar').classList.add("d-none");

  // Reset cobertura
  document.getElementById('cobertura').innerHTML = '<option value="">Seleccione</option>';
  document.getElementById('cobertura').disabled = true;
}
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

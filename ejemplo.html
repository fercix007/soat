<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Siniestro Mejorado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h3 class="mb-4">Nueva Solicitud</h3>

  <ul class="nav nav-tabs" id="formTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="datos-tab" data-bs-toggle="tab" data-bs-target="#datosAccidentado" type="button" role="tab">Datos del Accidentado</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="solicitante-tab" data-bs-toggle="tab" data-bs-target="#solicitante" type="button" role="tab">Solicitante y Beneficiario</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="documentos-tab" data-bs-toggle="tab" data-bs-target="#documentos" type="button" role="tab">Documentos</button>
    </li>
  </ul>

  <div class="tab-content bg-white border rounded p-4 mt-3" id="formTabsContent">
    <!-- TAB 1 -->
    <div class="tab-pane fade show active" id="datosAccidentado" role="tabpanel">
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Tipo de Solicitud</label>
          <select class="form-select">
            <option>Indemnización</option>
            <option>Reembolso</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Cobertura</label>
          <select class="form-select">
            <option>Incapacidad Temporal</option>
            <option>Fallecimiento</option>
          </select>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">Monto Solicitado</label>
          <input type="number" class="form-control" value="1890.00">
        </div>
        <div class="col-md-4">
          <label class="form-label">Fecha de Recepción</label>
          <input type="date" class="form-control" value="2025-06-26">
        </div>
      </div>

      <h6 class="mt-4">Datos del Accidentado</h6>
      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">Tipo Documento</label>
          <select class="form-select">
            <option>DNI</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Número</label>
          <input type="text" class="form-control" value="20454688">
        </div>
        <div class="col-md-4">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" value="Juan Manuel Prado Diaz">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Celular</label>
          <input type="text" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Correo</label>
          <input type="email" class="form-control">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-control">
      </div>
    </div>

    <!-- TAB 2 -->
    <div class="tab-pane fade" id="solicitante" role="tabpanel">
      <h6>Datos del Solicitante</h6>
      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">Tipo Documento</label>
          <select class="form-select">
            <option>DNI</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Número</label>
          <input type="text" class="form-control" value="20454688">
        </div>
        <div class="col-md-4">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" value="Juan Manuel Prado Diaz">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Relación con el Accidentado</label>
          <select class="form-select">
            <option>Accidentado</option>
            <option>Familiar</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Dirección</label>
          <input type="text" class="form-control">
        </div>
      </div>

      <hr>
      <h6>Datos del Beneficiario</h6>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Modalidad de Pago</label>
          <select class="form-select">
            <option>Transferencia</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Banco</label>
          <select class="form-select">
            <option>BBVA</option>
            <option>BCP</option>
          </select>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Tipo de Cuenta</label>
          <select class="form-select">
            <option>CTA Ahorros</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Moneda</label>
          <select class="form-select">
            <option>Soles</option>
            <option>Dólares</option>
          </select>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Nro Cuenta</label>
          <input type="text" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">CCI</label>
          <input type="text" class="form-control">
        </div>
      </div>
    </div>

    <!-- TAB 3 -->
    <div class="tab-pane fade" id="documentos" role="tabpanel">
      <h6 class="mb-3">Documentación Requerida</h6>
      <ul class="list-group mb-3">
        <li class="list-group-item d-flex justify-content-between align-items-center">
          Solicitud
          <i class="bi bi-check-circle-fill text-success"></i>
        </li>
        <li class="list-group-item d-flex justify-content-between align-items-center">
          Copia DNI del Solicitante
          <i class="bi bi-check-circle-fill text-success"></i>
        </li>
        <li class="list-group-item d-flex justify-content-between align-items-center">
          Denuncia Policial
          <i class="bi bi-check-circle-fill text-success"></i>
        </li>
        <li class="list-group-item d-flex justify-content-between align-items-center">
          Copia Certificado SOAT
          <i class="bi bi-check-circle-fill text-success"></i>
        </li>
        <li class="list-group-item d-flex justify-content-between align-items-center">
          Certificado Médico
          <i class="bi bi-check-circle-fill text-success"></i>
        </li>
      </ul>

      <div class="mb-3">
        <label class="form-label">Subir Archivo</label>
        <input type="file" class="form-control">
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <button class="btn btn-danger me-2">Cerrar</button>
    <button class="btn btn-success">Guardar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

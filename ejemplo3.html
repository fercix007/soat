<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario SOAT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .tab-content {
      border: 1px solid #dee2e6;
      border-top: none;
      padding: 20px;
      background-color: #fff;
    }
  </style>
</head>
<body class="bg-light">
<div class="container py-4">

  <h3 class="mb-4"><i class="bi bi-file-earmark-text me-2"></i>Solicitud de Indemnización SOAT</h3>

  <!-- Tabs -->
  <ul class="nav nav-tabs" id="formTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#generales">Datos Generales</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#solicitante">Solicitante</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#lesionado">Lesionado</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#beneficiarios">Beneficiarios</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#documentos">Documentos</button></li>
  </ul>

  <!-- Tab Content -->
  <form id="formSoat">
    <div class="tab-content">

      <!-- Generales -->
      <div class="tab-pane fade show active" id="generales" role="tabpanel">
        <div class="row g-3">
          <div class="col-md-3"><label class="form-label">Fecha Solicitud</label><input type="date" class="form-control" required></div>
          <div class="col-md-3"><label class="form-label">Fecha Accidente</label><input type="date" class="form-control" required></div>
          <div class="col-md-3"><label class="form-label">Placa</label><input type="text" class="form-control" value="T6W-355" required></div>
          <div class="col-md-3"><label class="form-label">N° Certificado</label><input type="text" class="form-control" value="7005241356" required></div>
        </div>
      </div>

      <!-- Solicitante -->
      <div class="tab-pane fade" id="solicitante" role="tabpanel">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Nombre</label><input type="text" class="form-control" value="JORGE YOMER REYNA MOZO"></div>
          <div class="col-md-3"><label class="form-label">DNI</label><input type="text" class="form-control" value="71620488"></div>
          <div class="col-md-3"><label class="form-label">Celular</label><input type="text" class="form-control" value="901107389"></div>
          <div class="col-md-6"><label class="form-label">Correo</label><input type="email" class="form-control" value="reynamozojorge3@gmail.com"></div>
          <div class="col-md-6"><label class="form-label">Domicilio</label><input type="text" class="form-control" value="BARRIO 3A C. POBLADO MENOR ALTO TRUJILLO MZ B LT 27"></div>
          <div class="col-md-6">
            <label class="form-label">Relación con el lesionado</label>
            <select class="form-select"><option selected>Lesionado</option><option>Cónyuge</option><option>Padre/Madre</option><option>Otro</option></select>
          </div>
        </div>
      </div>

      <!-- Lesionado -->
      <div class="tab-pane fade" id="lesionado" role="tabpanel">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Nombre</label><input type="text" class="form-control" value="JORGE YOMER REYNA MOZO"></div>
          <div class="col-md-3"><label class="form-label">DNI</label><input type="text" class="form-control" value="71620488"></div>
          <div class="col-md-3"><label class="form-label">Celular</label><input type="text" class="form-control" value="901107389"></div>
          <div class="col-md-6"><label class="form-label">Correo</label><input type="email" class="form-control" value="reynamozojorge3@gmail.com"></div>
          <div class="col-md-6"><label class="form-label">Domicilio</label><input type="text" class="form-control" value="BARRIO 3A C. POBLADO MENOR ALTO TRUJILLO MZ B LT 27"></div>
        </div>
      </div>

      <!-- Beneficiarios -->
      <div class="tab-pane fade" id="beneficiarios" role="tabpanel">
        <div id="beneficiariosContainer"></div>
        <button type="button" class="btn btn-outline-primary mt-3" onclick="agregarBeneficiario()">
          <i class="bi bi-person-plus-fill me-1"></i> Agregar Beneficiario
        </button>
      </div>

      <!-- Documentos -->
      <div class="tab-pane fade" id="documentos" role="tabpanel">
        <p>Selecciona los documentos presentados:</p>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">DNI Lesionado</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">DNI Solicitante</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Denuncia policial</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Certificado médico</label></div>
      </div>
    </div>

    <div class="text-end mt-4">
      <button type="submit" class="btn btn-success"><i class="bi bi-check2-circle me-1"></i>Enviar Solicitud</button>
    </div>
  </form>
</div>

<script>
let contador = 0;

function agregarBeneficiario() {
  contador++;
  const container = document.getElementById('beneficiariosContainer');

  const div = document.createElement('div');
  div.classList.add('border', 'rounded', 'p-3', 'mb-3');
  div.innerHTML = `
    <h6 class="mb-3">Beneficiario ${contador}</h6>
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Titular</label><input type="text" class="form-control" value="JORGE YOMER REYNA MOZO"></div>
      <div class="col-md-3"><label class="form-label">DNI</label><input type="text" class="form-control" value="71620488"></div>
      <div class="col-md-3">
        <label class="form-label">Banco</label>
        <select class="form-select"><option>Continental</option><option>BCP</option><option>Interbank</option><option>Scotiabank</option></select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Tipo de Cuenta</label>
        <select class="form-select"><option>Cta. Ahorros</option><option>Cta. Corriente</option></select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Moneda</label>
        <select class="form-select"><option>Soles</option><option>Dólares</option></select>
      </div>
      <div class="col-md-6"><label class="form-label">N° Cuenta</label><input type="text" class="form-control" value="57099110840013"></div>
      <div class="col-md-6"><label class="form-label">CCI</label><input type="text" class="form-control" value="00257019911084001305"></div>
    </div>
  `;
  container.appendChild(div);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
